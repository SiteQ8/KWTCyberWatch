<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Glow effect -->
  <circle cx="250" cy="250" r="200" fill="rgba(59,130,246,0.03)"/>
  <circle cx="550" cy="250" r="200" fill="rgba(16,185,129,0.02)"/>

  <!-- Login Card -->
  <rect x="250" y="50" width="300" height="400" rx="16" fill="rgba(17,24,39,0.9)" stroke="#1e293b" stroke-width="1"/>

  <!-- Logo Icon -->
  <rect x="362" y="75" width="56" height="56" rx="14" fill="url(#logo)"/>
  <text x="390" y="112" text-anchor="middle" fill="white" font-size="24">&#x1f6e1;</text>

  <!-- Title -->
  <text x="400" y="155" text-anchor="middle" fill="#f8fafc" font-family="Inter,sans-serif" font-size="18" font-weight="700">KWTCyberWatch</text>
  <text x="400" y="175" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11">Kuwait Domain Threat Intelligence</text>

  <!-- Username Label -->
  <text x="290" y="205" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">USERNAME</text>
  <!-- Username Input -->
  <rect x="280" y="212" width="240" height="38" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="296" y="236" fill="#3b82f6" font-family="monospace" font-size="13">admin</text>

  <!-- Password Label -->
  <text x="290" y="268" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">PASSWORD</text>
  <!-- Password Input -->
  <rect x="280" y="275" width="240" height="38" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="296" y="299" fill="#3b82f6" font-family="monospace" font-size="13">CyberWatch2024!</text>

  <!-- Sign In Button -->
  <rect x="280" y="330" width="240" height="42" rx="6" fill="url(#btn)"/>
  <text x="400" y="356" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="13" font-weight="600">Sign In to Dashboard</text>

  <!-- Demo Credentials Box -->
  <rect x="280" y="388" width="240" height="45" rx="6" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="400" y="406" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Demo Credentials</text>
  <text x="400" y="424" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Username: <tspan fill="#3b82f6" font-family="monospace">admin</tspan>  Password: <tspan fill="#3b82f6" font-family="monospace">CyberWatch2024!</tspan></text>
</svg>
