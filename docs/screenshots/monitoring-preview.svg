  <text x="454" y="116" fill="#f8fafc" font-family="Inter,sans-serif" font-size="22" font-weight="700">5</text>
  <text x="472" y="116" fill="#64748b" font-family="Inter,sans-serif" font-size="10">Active Keywords</text>

