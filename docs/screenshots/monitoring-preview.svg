  <text x="676" y="116" fill="#f8fafc" font-family="Inter,sans-serif" font-size="22" font-weight="700">189</text>
  <text x="710" y="116" fill="#64748b" font-family="Inter,sans-serif" font-size="10">Domains Logged</text>
  <text x="676" y="140" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Saved to <tspan fill="#3b82f6" font-family="monospace">filtered_domains.txt</tspan></text>
  <text x="676" y="164" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Storage Used</text>
  <text x="848" y="164" fill="#f59e0b" font-family="Inter,sans-serif" font-size="9" text-anchor="end">42%</text>
  <rect x="676" y="170" width="186" height="6" rx="3" fill="#0f172a"/>
  <rect x="676" y="170" width="78" height="6" rx="3" fill="#f59e0b"/>

  <!-- System Info Card -->
  <rect x="216" y="222" width="662" height="146" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="232" y="248" fill="#f8fafc" font-family="Inter,sans-serif" font-size="12" font-weight="600">System Information</text>
  <line x1="216" y1="258" x2="878" y2="258" stroke="#1e293b" stroke-width="1"/>

  <!-- System rows -->
  <text x="232" y="280" fill="#f8fafc" font-family="Inter,sans-serif" font-size="11" font-weight="500">CertStream Feed</text>
  <text x="232" y="292" fill="#64748b" font-family="Inter,sans-serif" font-size="9">wss://certstream-server-domain/</text>
  <rect x="810" y="272" width="52" height="18" rx="4" fill="rgba(59,130,246,0.1)"/>
  <text x="836" y="285" text-anchor="middle" fill="#3b82f6" font-family="Inter,sans-serif" font-size="9">Active</text>
  <line x1="232" y1="302" x2="862" y2="302" stroke="#1e293b" stroke-width="0.5"/>

  <text x="232" y="320" fill="#f8fafc" font-family="Inter,sans-serif" font-size="11" font-weight="500">Retry Strategy</text>
  <text x="232" y="332" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Exponential backoff: 5s to 300s max delay</text>
  <rect x="800" y="312" width="62" height="18" rx="4" fill="rgba(59,130,246,0.1)"/>
  <text x="831" y="325" text-anchor="middle" fill="#3b82f6" font-family="Inter,sans-serif" font-size="9">Enabled</text>
  <line x1="232" y1="342" x2="862" y2="342" stroke="#1e293b" stroke-width="0.5"/>

  <text x="232" y="358" fill="#f8fafc" font-family="Inter,sans-serif" font-size="11" font-weight="500">System Uptime</text>
  <text x="232" y="368" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Last restart: 14 days ago</text>
  <text x="848" y="362" fill="#10b981" font-family="Inter,sans-serif" font-size="12" font-weight="600" text-anchor="end">99.97%</text>
</svg>
