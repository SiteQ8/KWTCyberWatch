  <rect x="454" y="126" width="50" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>
  <text x="479" y="139" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">kuwait</text>
  <rect x="510" y="126" width="30" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>
  <text x="525" y="139" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">kw</text>
  <rect x="546" y="126" width="34" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>
  <text x="563" y="139" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">kwt</text>
  <rect x="586" y="126" width="30" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>
  <text x="601" y="139" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">kwi</text>
  <rect x="622" y="126" width="26" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>
  <text x="635" y="139" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8">q8</text>

  <text x="454" y="164" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Match Rate</text>
  <text x="620" y="164" fill="#3b82f6" font-family="Inter,sans-serif" font-size="9" text-anchor="end">0.15%</text>
  <rect x="454" y="170" width="178" height="6" rx="3" fill="#0f172a"/>
  <rect x="454" y="170" width="27" height="6" rx="3" fill="#3b82f6"/>

  <!-- Monitor Card 3 - Storage -->
  <rect x="660" y="68" width="218" height="140" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
