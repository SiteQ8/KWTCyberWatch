<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bgm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bgm)" rx="8"/>

  <!-- Sidebar (abbreviated) -->
  <rect x="0" y="0" width="200" height="380" fill="#111827" rx="8"/>
  <rect x="8" y="0" width="192" height="380" fill="#111827"/>
  <rect x="16" y="18" width="32" height="32" rx="8" fill="#3b82f6"/>
  <text x="32" y="40" text-anchor="middle" fill="white" font-size="14">&#x1f6e1;</text>
  <text x="58" y="32" fill="#f8fafc" font-family="Inter,sans-serif" font-size="12" font-weight="700">KWTCyberWatch</text>
  <line x1="16" y1="62" x2="184" y2="62" stroke="#1e293b" stroke-width="1"/>
  <text x="40" y="88" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11">&#x1f4ca; Dashboard</text>
  <text x="40" y="112" fill="#94a3b8" font-family="Inter,sans-serif" font-size="11">&#x26a0;  Alerts</text>
  <rect x="12" y="120" width="176" height="32" rx="6" fill="rgba(59,130,246,0.1)"/>
  <text x="40" y="141" fill="#3b82f6" font-family="Inter,sans-serif" font-size="11">&#x1f50d; Monitoring</text>

  <!-- Top Bar -->
  <rect x="200" y="0" width="700" height="52" fill="rgba(17,24,39,0.5)"/>
  <line x1="200" y1="52" x2="900" y2="52" stroke="#1e293b" stroke-width="1"/>
  <text x="224" y="24" fill="#f8fafc" font-family="Inter,sans-serif" font-size="15" font-weight="700">Monitoring Status</text>
  <text x="224" y="40" fill="#64748b" font-family="Inter,sans-serif" font-size="10">CertStream connection status and keyword tracking</text>

  <!-- Live Badge -->
  <rect x="770" y="14" width="110" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <circle cx="786" cy="27" r="4" fill="#10b981"/>
  <text x="796" y="31" fill="#10b981" font-family="Inter,sans-serif" font-size="10" font-weight="600">Live Monitoring</text>

  <!-- Monitor Card 1 - CertStream -->
  <rect x="216" y="68" width="210" height="140" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="232" y="92" fill="#f8fafc" font-family="Inter,sans-serif" font-size="12" font-weight="600">&#x1f4e1; CertStream Connection</text>
  <rect x="232" y="102" width="74" height="20" rx="4" fill="rgba(59,130,246,0.1)"/>
  <circle cx="244" cy="112" r="3" fill="#3b82f6"/>
  <text x="252" y="116" fill="#3b82f6" font-family="Inter,sans-serif" font-size="9">Connected</text>
  <text x="232" y="140" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Real-time CT log stream active</text>
  <text x="232" y="164" fill="#64748b" font-family="Inter,sans-serif" font-size="9">Connection Health</text>
  <text x="398" y="164" fill="#10b981" font-family="Inter,sans-serif" font-size="9" text-anchor="end">99.97%</text>
  <rect x="232" y="170" width="178" height="6" rx="3" fill="#0f172a"/>
  <rect x="232" y="170" width="177" height="6" rx="3" fill="#10b981"/>

